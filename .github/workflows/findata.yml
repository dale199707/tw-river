name: Financial Data Pipeline

on:
  schedule:
    - cron: "30 2 16 4,5,8,11 *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: findata
  cancel-in-progress: false

jobs:
  findata:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas lxml html5lib beautifulsoup4

      - name: Update dividends and rebuild screen
        run: python3 pipeline/fetch_mops.py --update

      - name: Commit data
        run: |
          git config user.name "findata-bot"
          git config user.email "actions@github.com"
          git add data/fin data/screen.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "findata: dividends update $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push
          fi
