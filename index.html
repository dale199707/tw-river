<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* ============ 常數 ============ */
const PROXY = "https://tw-river-api.dale199707.workers.dev";
const YEARS_BACK = 9;
const BAND_YEARS = 3;
const INDUSTRY = {"01":"水泥","02":"食品","03":"塑膠","04":"紡織纖維","05":"電機機械","06":"電器電纜","08":"玻璃陶瓷","09":"造紙","10":"鋼鐵","11":"橡膠","12":"汽車","14":"建材營造","15":"航運","16":"觀光餐旅","17":"金融保險","18":"貿易百貨","19":"綜合","20":"其他","21":"化學","22":"生技醫療","23":"油電燃氣","24":"半導體","25":"電腦及週邊","26":"光電","27":"通信網路","28":"電子零組件","29":"電子通路","30":"資訊服務","31":"其他電子","32":"文化創意","33":"農業科技","34":"電子商務","35":"綠能環保","36":"數位雲端","37":"運動休閒","38":"居家生活"};

/* ============ 工具 ============ */
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const num = v => { if(v==null) return null; const n=parseFloat(String(v).replace(/,/g,"")); return isFinite(n)?n:null; };
const fmt = (v,d=1) => v==null||!isFinite(v)?"—":v.toLocaleString("zh-TW",{minimumFractionDigits:d,maximumFractionDigits:d});
const todayKey = () => new Date().toISOString().slice(0,10);
/* 全市場快照的快取鍵：台北時間。14:00 前=前日收盤(a)；14–18 時每小時重抓一次(hN，等 TWSE 發佈今日收盤)；18 時後固定(b) */
const snapKey = () => {
  const t = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  const d = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
  const h = t.getHours();
  return `twri-snap2-${d}-${h<14?"a":h<18?"h"+h:"b"}`;
};

const cacheGet = k => { try{ const s=localStorage.getItem(k); return s?JSON.parse(s):null; }catch(e){ return null; } };
const cacheSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ try{ Object.keys(localStorage).filter(x=>x.startsWith("twri-y-")).slice(0,50).forEach(x=>localStorage.removeItem(x)); localStorage.setItem(k,JSON.stringify(v)); }catch(e2){} } };

async function fetchJSON(url){
  const res = await fetch(url,{cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}

/* ============ 資料層：全市場快照（每日一次） ============ */
/* 最新收盤（Worker /today v3，STOCK_DAY_ALL 永遠回最近一個交易日、永不比 openapi 舊）：
   有資料就無條件覆蓋 quotes 收盤。15:00 後為當日、之前（含凌晨）為前一交易日 */
async function loadToday(){
  try{
    const r=await fetch(`${PROXY}/today`);
    if(!r.ok) return null;
    const j=await r.json();
    if(!j||!j.close||!Object.keys(j.close).length) return null;
    return j.close;
  }catch(e){ return null; }
}

async function loadSnapshots(){
  const key = snapKey();
  const c = cacheGet(key);
  let snap;
  if(c){ snap=c; }
  else{
    /* 上櫃：TPEX 擋 Cloudflare 出口且端點無 CORS，Worker 代理與瀏覽器直連皆不可行；
       改讀 Actions 每日產生的同源靜態檔 data/tpex_snap.json（--tpex-snap）。
       抓取失敗時退化為僅上市，快照鍵換代後重抓。上櫃收盤＝每日 Actions 跑完後的資料日（非即時）。 */
    const [info,bwi,avg,osnap] = await Promise.all([
      fetchJSON(`${PROXY}/openapi/v1/opendata/t187ap03_L`),
      fetchJSON(`${PROXY}/openapi/v1/exchangeReport/BWIBBU_ALL`),
      fetchJSON(`${PROXY}/openapi/v1/exchangeReport/STOCK_DAY_AVG_ALL`),
      fetchJSON(`data/tpex_snap.json`).catch(()=>null),
    ]);
    const companies = info.map(r=>({
      code:r["公司代號"], name:r["公司簡稱"]||r["公司名稱"], full:r["公司名稱"],
      ind:INDUSTRY[r["產業別"]]||r["產業別"]||"—",
      chair:r["董事長"]||"—",
      capital:num(r["實收資本額"]),
      est:r["成立日期"], ipo:r["上市日期"],
      market:"twse",
    })).concat(((osnap&&osnap.companies)||[]).map(r=>({
      code:r.c, name:r.n||r.f, full:r.f,
      ind:INDUSTRY[r.i]||r.i||"—",
      chair:r.ch||"—",
      capital:r.cap,
      est:r.est, ipo:r.ipo,
      market:"tpex",
    })));
    const quotes = {};
    bwi.forEach(r=>{ quotes[r.Code]={pe:num(r.PEratio),pb:num(r.PBratio),yield:num(r.DividendYield)}; });
    avg.forEach(r=>{ const q=quotes[r.Code]||(quotes[r.Code]={}); q.close=num(r.ClosingPrice); q.mavg=num(r.MonthlyAveragePrice); });
    if(osnap&&osnap.q){ Object.keys(osnap.q).forEach(cd=>{ const s=osnap.q[cd]; quotes[cd]={pe:s.pe,pb:s.pb,yield:s.yield,close:s.close}; }); }
    snap = {companies,quotes};
    Object.keys(localStorage).filter(k=>k.startsWith("twri-snap")&&k!==key).forEach(k=>localStorage.removeItem(k));
    cacheSet(key,snap);
  }
  const today = await loadToday();
  if(today){
    Object.keys(today).forEach(cd=>{ const q=snap.quotes[cd]; if(q) q.close=today[cd]; });
  }
  return snap;
}

/* ============ 資料層：單一股票歷史年度資料 ============ */
function pickCol(fields,keys){
  for(const kw of keys){ const i=fields.findIndex(f=>String(f).includes(kw)); if(i>=0) return i; }
  return -1;
}

function parseYearPrice(j){
  if(!j||j.stat!=="OK"||!j.data||!j.data.length) return null;
  const f=j.fields||[];
  const iMon=pickCol(f,["月份","月"]), iHi=pickCol(f,["最高價"]), iLo=pickCol(f,["最低價"]), iAvg=pickCol(f,["平均"]);
  const months=j.data.map(row=>({
    mon:num(row[iMon]), hi:num(row[iHi]), lo:num(row[iLo]), avg:num(row[iAvg]),
  })).filter(m=>m.hi!=null&&m.lo!=null);
  if(!months.length) return null;
  return {
    hi:Math.max(...months.map(m=>m.hi)),
    lo:Math.min(...months.map(m=>m.lo)),
    avg:months.reduce((s,m)=>s+(m.avg??((m.hi+m.lo)/2)),0)/months.length,
    months,
  };
}

function parseMonthRatio(j){
  if(!j||j.stat!=="OK"||!j.data||!j.data.length) return null;
  const f=j.fields||[];
  const iPE=pickCol(f,["本益比"]), iPB=pickCol(f,["股價淨值比"]), iY=pickCol(f,["殖利率"]);
  const rows=j.data.map(r=>({pe:num(r[iPE]),pb:num(r[iPB]),y:num(r[iY])}));
  const mean=arr=>{const a=arr.filter(v=>v!=null&&v>0);return a.length?a.reduce((s,v)=>s+v,0)/a.length:null;};
  const out={pe:mean(rows.map(r=>r.pe)),pb:mean(rows.map(r=>r.pb)),yield:mean(rows.map(r=>r.y))};
  return (out.pe||out.pb||out.yield)?out:null;
}

function buildYearData(year,price,ratio,refPrice){
  if(!price) return null;
  let eps=null,bvps=null,dps=null;
  if(ratio&&refPrice){
    if(ratio.pe) eps=refPrice/ratio.pe;
    if(ratio.pb) bvps=refPrice/ratio.pb;
    if(ratio.yield) dps=refPrice*ratio.yield/100;
  }
  return {
    year, hi:price.hi, lo:price.lo, avg:price.avg,
    eps,bvps,dps,
    peHi: eps?price.hi/eps:null, peLo: eps?price.lo/eps:null, peAvg: eps?price.avg/eps:null,
    pbHi: bvps?price.hi/bvps:null, pbLo: bvps?price.lo/bvps:null, pbAvg: bvps?price.avg/bvps:null,
    yAtHi: dps?dps/price.hi*100:null, yAtLo: dps?dps/price.lo*100:null, yAtAvg: dps?dps/price.avg*100:null,
    _d:todayKey(),
  };
}

/* 歷史價格靜態檔（data/price/{code}.json，pipeline 每月產生）：
   {"code","updated","y":{"2018":{hi,lo,avg,pe,pb,yield,ref}|null,...}} 只含已完結年度、null=該年無資料 */
const priceMem=new Map();
async function loadPriceStatic(code){
  if(priceMem.has(code)) return priceMem.get(code);
  try{
    const r=await fetch(`data/price/${code}.json`,{cache:"no-store"});
    if(!r.ok){ priceMem.set(code,null); return null; }
    const j=await r.json();
    priceMem.set(code,j);
    return j;
  }catch(e){ priceMem.set(code,null); return null; }
}

/* 上櫃當年逐月（data/tpex_ytd.json，Actions 每日累計）：
   {"year","last","m":{code:{"月":{hi,lo,sum,n}}}}，月均=sum/n（同 pipeline mean(closes) 語意） */
let ytdMem;
async function loadTpexYtd(){
  if(ytdMem!==undefined) return ytdMem;
  try{
    const r=await fetch(`data/tpex_ytd.json`,{cache:"no-store"});
    ytdMem=r.ok?await r.json():null;
  }catch(e){ ytdMem=null; }
  return ytdMem;
}
function tpexYearPrice(ytd,code,nowY){
  if(!ytd||ytd.year!==nowY||!ytd.m||!ytd.m[code]) return null;
  const mm=ytd.m[code];
  const months=Object.keys(mm).map(k=>{const v=mm[k];return {mon:+k,hi:v.hi,lo:v.lo,avg:v.n?v.sum/v.n:null};})
    .filter(m=>m.hi!=null&&m.lo!=null&&m.avg!=null).sort((a,b)=>a.mon-b.mon);
  if(!months.length) return null;
  return {hi:Math.max(...months.map(m=>m.hi)),lo:Math.min(...months.map(m=>m.lo)),
          avg:months.reduce((s,m)=>s+m.avg,0)/months.length,months};
}

async function loadHistory(code,years,quote,market){
  const nowY=years[years.length-1];
  const cached={};
  let allCached=true;
  years.forEach(y=>{
    const c=cacheGet(`twri-y-${code}-${y}`);
    /* /bundle 時代限流殘留的殘缺年快取（eps/bvps/dps 全空）視為無效，改讀靜態檔自癒 */
    const defective=c&&y<nowY&&c.eps==null&&c.bvps==null&&c.dps==null;
    if(c&&!defective&&(y<nowY||c._d===todayKey())) cached[y]=c;
    else allCached=false;
  });
  if(allCached) return years.map(y=>cached[y]);

  /* 主路徑：歷史年讀同源靜態檔（不經 TWSE，根治限流），僅當年走 /bundle 即時（每檔 2–3 上游請求） */
  const stat=await loadPriceStatic(code);
  if(stat&&stat.y){
    const out=years.map(y=>{
      if(cached[y]) return cached[y];
      if(y===nowY) return null;
      const e=stat.y[y];
      if(!e) return null;
      const ratio=(e.pe!=null||e.pb!=null||e.yield!=null)?{pe:e.pe,pb:e.pb,yield:e.yield}:null;
      const d=buildYearData(y,{hi:e.hi,lo:e.lo,avg:e.avg},ratio,e.ref);
      if(d) cacheSet(`twri-y-${code}-${y}`,d);
      return d;
    });
    if(!cached[nowY]){
      for(let attempt=0;attempt<2;attempt++){
        try{
          let price=null,raw={};
          if(market==="tpex"){
            /* 上櫃當年：同源靜態 ytd 檔（全站僅載一次）；ratio/ref 用快照 */
            price=tpexYearPrice(await loadTpexYtd(),code,nowY);
          }else{
            const bundle=await fetchJSON(`${PROXY}/bundle?stockNo=${code}&from=${nowY}&to=${nowY}`);
            raw=(bundle.years&&bundle.years[nowY])||{};
            price=parseYearPrice(raw.price);
          }
          if(price){
            let ratio=null,refPrice=null;
            if(quote&&(market==="tpex"?(quote.pe!=null||quote.pb!=null||quote.yield!=null):quote.pe!=null)){
              ratio={pe:quote.pe,pb:quote.pb,yield:quote.yield};
              refPrice=quote.close;
            }else if(market!=="tpex"){
              ratio=parseMonthRatio(raw.ratio)||parseMonthRatio(raw.ratioPrev);
              if(ratio){
                const refMon=price.months[price.months.length-1].mon;
                const mrow=price.months.find(x=>x.mon===refMon);
                refPrice=mrow?(mrow.avg??(mrow.hi+mrow.lo)/2):price.avg;
              }
            }
            const d=buildYearData(nowY,price,ratio,refPrice);
            if(d){ cacheSet(`twri-y-${code}-${nowY}`,d); out[out.length-1]=d; }
          }
          break;
        }catch(e){ if(attempt<1) await new Promise(r=>setTimeout(r,1500)); }
      }
    }
    if(out.some(d=>d!=null)) return out;
    /* 靜態檔存在但整段無資料（異常）→ 落回完整 /bundle */
  }

  /* fallback（上櫃）：靜態檔未涵蓋（如新掛牌）只取當年（ytd 檔），歷史年待 pipeline 月更補齊 */
  if(market==="tpex"){
    const out=years.map(y=>cached[y]||null);
    if(!cached[nowY]){
      const price=tpexYearPrice(await loadTpexYtd(),code,nowY);
      if(price){
        const ratio=(quote&&(quote.pe!=null||quote.pb!=null||quote.yield!=null))?{pe:quote.pe,pb:quote.pb,yield:quote.yield}:null;
        const d=buildYearData(nowY,price,ratio,ratio?quote.close:null);
        if(d){ cacheSet(`twri-y-${code}-${nowY}`,d); out[out.length-1]=d; }
      }
    }
    return out;
  }
  /* fallback：靜態檔未涵蓋此代號（如新上市、回補未完）時走原完整 /bundle 路徑。
     TWSE 偶發限流時 bundle 會整包空回，自動重試最多 3 次（修正版 Worker 對失敗不快取，重試即有效） */
  let out=null;
  for(let attempt=0;attempt<3;attempt++){
    let bundle=null;
    try{
      bundle=await fetchJSON(`${PROXY}/bundle?stockNo=${code}&from=${years[0]}&to=${nowY}`);
    }catch(e){
      if(attempt===2) throw e;
      await new Promise(r=>setTimeout(r,1500*(attempt+1)));
      continue;
    }
    out=years.map(y=>{
      if(cached[y]) return cached[y];
      const raw=(bundle.years&&bundle.years[y])||{};
      const price=parseYearPrice(raw.price);
      if(!price) return null;
      let ratio=null,refPrice=null;
      if(y===nowY&&quote&&quote.pe!=null){
        ratio={pe:quote.pe,pb:quote.pb,yield:quote.yield};
        refPrice=quote.close;
      } else {
        ratio=parseMonthRatio(raw.ratio)||parseMonthRatio(raw.ratioPrev);
        if(ratio){
          const refMon=(y<nowY)?12:price.months[price.months.length-1].mon;
          const mrow=price.months.find(x=>x.mon===refMon);
          refPrice=mrow?(mrow.avg??(mrow.hi+mrow.lo)/2):price.avg;
        }
      }
      const d=buildYearData(y,price,ratio,refPrice);
      if(d) cacheSet(`twri-y-${code}-${y}`,d);
      return d;
    });
    if(out.some(d=>d!=null)) return out;
    if(attempt<2) await new Promise(r=>setTimeout(r,1500*(attempt+1)));
  }
  return out;
}

/* ============ 財報資料（data/fin/{code}.json，由 pipeline 產生） ============ */
const finMem=new Map();
async function loadFin(code){
  if(finMem.has(code)) return finMem.get(code);
  try{
    const r=await fetch(`data/fin/${code}.json`,{cache:"no-store"});
    if(!r.ok){ finMem.set(code,null); return null; }
    const j=await r.json();
    finMem.set(code,j);
    return j;
  }catch(e){ return null; }
}

const CUM_FIELDS=["rev","gp","op","ni","eps","dep","ocf","capex","nonop"];
function finQuarters(fin){
  if(!fin||!fin.q) return null;
  const rows=Object.keys(fin.q).map(k=>{
    const m=k.match(/^(\d{4})Q([1-4])$/);
    return m?{k,y:+m[1],s:+m[2],...fin.q[k]}:null;
  }).filter(Boolean).sort((a,b)=>a.y-b.y||a.s-b.s);
  if(!rows.length) return null;
  rows.forEach(r=>{
    const prev=r.s>1?rows.find(x=>x.y===r.y&&x.s===r.s-1):null;
    CUM_FIELDS.forEach(f=>{
      if(r.s===1) r[f+"_q"]=r[f]??null;
      else r[f+"_q"]=(r[f]!=null&&prev&&prev[f]!=null)?r[f]-prev[f]:null;
    });
  });
  return rows;
}
function trailing4(rows,i,field){
  let sum=0,n=0;
  for(let j=i;j>=0&&n<4;j--){ const v=rows[j][field]; if(v==null) return null; sum+=v; n++; }
  return n===4?sum:null;
}

function QChart({title,labels,series,unit="",decimals=1,hover=false,stacked=false,ylog=false,dots=false,endLabels=true}){
  const W=460,H=230,PAD={l:14,r:56,t:20,b:26};
  const [hi,setHi]=useState(null);
  const TR=ylog?(v=>Math.sign(v)*Math.log10(1+Math.abs(v))):(v=>v);
  const all=series.flatMap(s=>s.data.filter(v=>v!=null)).map(TR);
  if(!all.length) return (
    <div className="chartpanel"><div className="charthead">{title}</div>
    <div style={{color:"#556",textAlign:"center",padding:"50px 0"}}>資料不足</div></div>
  );
  const hasBar=series.some(s=>s.bar);
  const barSeries0=series.filter(s=>s.bar);
  let vmax=Math.max(...all),vmin=Math.min(...all,0);
  if(hasBar) vmax=Math.max(vmax,0);
  const stackTop=labels.map(()=>0),stackBot=labels.map(()=>0);
  if(stacked&&barSeries0.length){
    labels.forEach((_,i)=>{
      let p=0,n=0;
      barSeries0.forEach(sr=>{const v=sr.data[i];if(v==null)return;if(v>=0)p+=v;else n+=v;});
      stackTop[i]=p; stackBot[i]=n;
      vmax=Math.max(vmax,p); vmin=Math.min(vmin,n);
    });
  }
  const span=(vmax-vmin)||1; vmax+=span*0.12; vmin-=span*0.08;
  const X=i=>PAD.l+i*(W-PAD.l-PAD.r)/Math.max(labels.length-1,1);
  const Y=v=>PAD.t+(1-(TR(v)-vmin)/(vmax-vmin))*(H-PAD.t-PAD.b);
  /* 線尾標籤防碰撞：無 vlabel 系列的最後一點標籤，由上而下依序推開至少 11px */
  const endY={};
  {
    const items=series.map((s,si)=>{
      if(s.vlabel) return null;
      const li=s.data.map((v,i)=>v!=null?i:-1).filter(i=>i>=0).pop();
      return li==null?null:{si,y:Y(s.data[li])+4};
    }).filter(Boolean).sort((a,b)=>a.y-b.y);
    for(let i=1;i<items.length;i++) if(items[i].y<items[i-1].y+11) items[i].y=items[i-1].y+11;
    items.forEach(o=>{endY[o.si]=o.y;});
  }
  const step=Math.max(1,Math.ceil(labels.length/9));
  const barSeries=series.filter(s=>s.bar);
  const slotW=(W-PAD.l-PAD.r)/Math.max(labels.length,1);
  const bw=stacked?Math.max(4,Math.min(16,slotW*0.55)):Math.max(2,Math.min(10,(slotW*0.75)/Math.max(barSeries.length,1)));
  let barIdx=-1;
  const posCum=labels.map(()=>0),negCum=labels.map(()=>0);
  return (
    <div className="chartpanel">
      <div className="charthead">{title}</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
        {(vmin<0||hasBar)&&<line x1={PAD.l} x2={W-PAD.r} y1={Y(0)} y2={Y(0)} stroke="#334" strokeWidth="1"/>}
        {series.map((s,si)=>{
          const lastIdx=s.data.map((v,i)=>v!=null?i:-1).filter(i=>i>=0).pop();
          if(s.bar){
            barIdx++;
            const off=stacked?-bw/2:-(barSeries.length*bw)/2+barIdx*bw;
            const seg=s.data.map((v,i)=>{
              if(v==null) return null;
              if(!stacked) return {a:0,b:v};
              if(v>=0){const a=posCum[i];posCum[i]+=v;return {a,b:a+v};}
              const a=negCum[i];negCum[i]+=v;return {a,b:a+v};
            });
            return (
              <g key={si}>
                {seg.map((t,i)=>t==null?null:(
                  <rect key={i} x={X(i)+off} width={Math.max(bw-1,1)}
                    y={Y(Math.max(t.a,t.b))} height={Math.max(Math.abs(Y(t.b)-Y(t.a)),1)}
                    fill={s.color} opacity="0.9"/>
                ))}
                {s.vlabel&&seg.map((t,i)=>{
                  if(t==null) return null;
                  let ly;
                  if(stacked&&s.vlabel==="top") ly=Y(Math.max(stackTop[i],0))-4;
                  else if(stacked&&s.vlabel==="bottom") ly=Y(Math.min(stackBot[i],0))+12;
                  else ly=s.data[i]>=0?Y(Math.max(t.a,t.b))-4:Y(Math.min(t.a,t.b))+12;
                  return (
                    <text key={"vl"+i} x={Math.min(Math.max(X(i),PAD.l+16),W-PAD.r)} y={ly} fill={s.color} fontSize="9.5" fontWeight="700" textAnchor="middle" className="mono">{fmt(s.data[i],decimals)}{unit}</text>
                  );
                })}
                {endLabels&&!s.vlabel&&lastIdx!=null&&<text x={X(lastIdx)+6+bw} y={endY[si]} fill={s.color} fontSize="10.5" fontWeight="700" className="mono">{fmt(s.data[lastIdx],decimals)}{unit}</text>}
              </g>
            );
          }
          let path="",started=false;
          s.data.forEach((v,i)=>{ if(v==null) return; path+=(started?"L":"M")+X(i).toFixed(1)+","+Y(v).toFixed(1); started=true; });
          return (
            <g key={si}>
              <path d={path} fill="none" stroke={s.color} strokeWidth="2"/>
              {dots&&s.data.map((v,i)=>v==null?null:<circle key={"d"+i} cx={X(i)} cy={Y(v)} r="3" fill={s.color}/>)}
              {s.vlabel&&s.data.map((v,i)=>v==null?null:(
                <text key={"vl"+i} x={Math.min(Math.max(X(i),PAD.l+16),W-PAD.r)} y={Y(v)+(s.vlabel==="below"?15:-7)} fill={s.color} fontSize="9.5" fontWeight="700" textAnchor="middle" className="mono">{fmt(v,decimals)}{unit}</text>
              ))}
              {endLabels&&!s.vlabel&&lastIdx!=null&&(
                <text x={X(lastIdx)+6} y={endY[si]} fill={s.color} fontSize="10.5" fontWeight="700" className="mono">{fmt(s.data[lastIdx],decimals)}{unit}</text>
              )}
            </g>
          );
        })}
        {labels.map((lb,i)=>i%step===0?(
          <text key={i} x={X(i)} y={H-8} fill="#8b98a9" fontSize="9.5" textAnchor="middle" className="mono">{lb}</text>
        ):null)}
        {hover&&hi!=null&&(()=>{
          const items=series.filter(s=>s.bar).map(s=>({name:s.name,color:s.color,v:s.data[hi]})).filter(o=>o.v!=null);
          if(!items.length) return null;
          return (
            <g pointerEvents="none">
              <line x1={X(hi)} x2={X(hi)} y1={PAD.t-4} y2={H-PAD.b} stroke="#667" strokeWidth="1" strokeDasharray="3,3"/>
              <text x={PAD.l} y={13} fill="#8b98a9" fontSize="10" fontWeight="700" className="mono">{labels[hi]}</text>
              {items.map((o,k)=>(
                <text key={k} x={PAD.l+52+k*130} y={13} fill={o.color} fontSize="10.5" fontWeight="700" className="mono">{o.name} {fmt(o.v,decimals)}{unit}</text>
              ))}
            </g>
          );
        })()}
        {hover&&labels.map((_,i)=>(
          <rect key={"h"+i} x={X(i)-slotW/2} y={PAD.t-4} width={slotW} height={H-PAD.t-PAD.b+4} fill="transparent"
            onMouseEnter={()=>setHi(i)} onMouseLeave={()=>setHi(null)}
            onClick={()=>setHi(p=>p===i?null:i)}/>
        ))}
      </svg>
      <div className="legend" style={{flexWrap:"wrap"}}>
        {series.map((s,si)=><span key={si} style={{color:"var(--dim)"}}><span style={{color:s.color,fontWeight:700}}>{s.bar?"▮":"—"}</span> {s.name}</span>)}
      </div>
    </div>
  );
}

function StackChart({title,labels,series,unit="億"}){
  const W=460,H=230,PAD={l:14,r:56,t:20,b:26};
  const n=labels.length;
  const sums=labels.map((_,i)=>series.reduce((s,sr)=>s+(sr.data[i]||0),0));
  const vmax=Math.max(...sums,1)*1.08;
  const X=i=>PAD.l+i*(W-PAD.l-PAD.r)/Math.max(n-1,1);
  const Y=v=>PAD.t+(1-v/vmax)*(H-PAD.t-PAD.b);
  const step=Math.max(1,Math.ceil(n/9));
  let base=labels.map(()=>0);
  const areas=series.map(sr=>{
    const top=base.map((b,i)=>b+(sr.data[i]||0));
    const path=top.map((v,i)=>(i?"L":"M")+X(i).toFixed(1)+","+Y(v).toFixed(1)).join("")
      +[...base].reverse().map((v,idx)=>{const i=n-1-idx;return "L"+X(i).toFixed(1)+","+Y(v).toFixed(1);}).join("")+"Z";
    base=top;
    return {path,color:sr.color,name:sr.name};
  });
  return (
    <div className="chartpanel">
      <div className="charthead">{title}</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
        {areas.map((a,i)=><path key={i} d={a.path} fill={a.color} opacity="0.85"/>)}
        {labels.map((lb,i)=>i%step===0?(
          <text key={i} x={X(i)} y={H-8} fill="#8b98a9" fontSize="9.5" textAnchor="middle" className="mono">{lb}</text>
        ):null)}
        <text x={W-PAD.r+4} y={Y(sums[n-1])+4} fill="#e6edf3" fontSize="10.5" fontWeight="700" className="mono">{fmt(sums[n-1],0)}{unit}</text>
      </svg>
      <div className="legend" style={{flexWrap:"wrap"}}>
        {series.map((s,si)=><span key={si} style={{color:"var(--dim)"}}><span style={{color:s.color,fontWeight:700}}>■</span> {s.name}</span>)}
      </div>
    </div>
  );
}

/* ============ 河流圖 (SVG) ============ */
function RiverChart({title,years,series,nowValue,nowLabel,decimals=1,unit="",invert=false,hiLabel,loLabel,note}){
  const W=460,H=260,PAD={l:14,r:44,t:26,b:26};
  const ptsAll=years.map((y,i)=>({y,hi:series.hi[i],lo:series.lo[i],avg:series.avg[i]}));
  const idxValid=ptsAll.map((p,i)=>p.hi!=null?i:-1).filter(i=>i>=0);
  if(!idxValid.length) return (
    <div className="chartpanel"><div className="charthead">{title}</div>
    <div style={{color:"#556",textAlign:"center",padding:"60px 0"}}>此期間無足夠資料</div></div>
  );
  /* 裁掉頭尾完全無資料的年份（新上市股不留左半空白）；中間缺口保留、填色分段 */
  const pts=ptsAll.slice(idxValid[0],idxValid[idxValid.length-1]+1);
  const valid=pts.filter(p=>p.hi!=null);
  let vmax=Math.max(...valid.map(p=>p.hi)), vmin=Math.min(...valid.map(p=>p.lo));
  if(nowValue!=null){ vmax=Math.max(vmax,nowValue); vmin=Math.min(vmin,nowValue); }
  const span=(vmax-vmin)||1; vmax+=span*0.1; vmin-=span*0.1;
  const X=i=>PAD.l+ i*(W-PAD.l-PAD.r)/Math.max(pts.length-1,1);
  const Y=v=>{const t=(v-vmin)/(vmax-vmin);return PAD.t+(invert?t:1-t)*(H-PAD.t-PAD.b);};
  const path=key=>{
    let s="",started=false;
    pts.forEach((p,i)=>{ if(p[key]==null){started=false;return;} s+=(started?"L":"M")+X(i).toFixed(1)+","+Y(p[key]).toFixed(1); started=true; });
    return s;
  };
  const bandPath=(()=>{
    let s="",run=[];
    const flush=()=>{
      if(run.length>=2){
        const top=run.map((p,k)=>(k?"L":"M")+X(p.i).toFixed(1)+","+Y(p.hi).toFixed(1)).join("");
        const bot=[...run].reverse().map(p=>"L"+X(p.i).toFixed(1)+","+Y(p.lo).toFixed(1)).join("");
        s+=top+bot+"Z";
      }
      run=[];
    };
    pts.forEach((p,i)=>{ if(p.hi==null){flush();return;} run.push({i,hi:p.hi,lo:p.lo}); });
    flush();
    return s;
  })();
  const lastIdx=pts.map((p,i)=>p.hi!=null?i:-1).filter(i=>i>=0).pop();
  return (
    <div className="chartpanel">
      <div className="charthead">{title}</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
        <path d={bandPath} fill="rgba(83,200,245,0.07)"/>
        <path d={path("hi")} fill="none" stroke="var(--hi)" strokeWidth="2.2"/>
        <path d={path("avg")} fill="none" stroke="var(--avg)" strokeWidth="1.2" opacity="0.9"/>
        <path d={path("lo")} fill="none" stroke="var(--lo)" strokeWidth="2.2"/>
        {pts.map((p,i)=>p.hi==null?null:(
          <g key={i} className="mono">
            <text x={X(i)} y={Y(p.hi)-7} fill="var(--hi)" fontSize="10.5" textAnchor="middle" fontWeight="700">{fmt(p.hi,decimals)}</text>
            <text x={X(i)} y={Y(p.lo)+15} fill="var(--lo)" fontSize="10.5" textAnchor="middle" fontWeight="700">{fmt(p.lo,decimals)}</text>
          </g>
        ))}
        {nowValue!=null&&lastIdx!=null&&(
          <g>
            <line x1={PAD.l} x2={W-PAD.r+20} y1={Y(nowValue)} y2={Y(nowValue)} stroke="var(--gold)" strokeWidth="1" strokeDasharray="5 4" opacity="0.85"/>
            <circle cx={X(lastIdx)} cy={Y(nowValue)} r="4.5" fill="var(--gold)"/>
            <text x={W-PAD.r+22} y={Y(nowValue)+4} fill="var(--gold)" fontSize="11" fontWeight="700" textAnchor="start" className="mono">{fmt(nowValue,decimals)}</text>
          </g>
        )}
        {pts.map((p,i)=>(
          <text key={"x"+i} x={X(i)} y={H-8} fill="#8b98a9" fontSize="11" textAnchor="middle" className="mono">{p.y-1911}</text>
        ))}
      </svg>
      <div className="legend">
        <span className="lg-hi">{hiLabel||("年最高"+unit)}</span>
        <span className="lg-avg">年平均</span>
        <span className="lg-lo">{loLabel||("年最低"+unit)}</span>
        {nowValue!=null&&<span className="lg-now">{nowLabel}</span>}
      </div>
      {note&&<div className="note" style={{marginTop:4,fontSize:11.5}}>{note}</div>}
    </div>
  );
}

/* ============ 位置判斷 ============ */
function positionOf(v,lo,hi,invert){
  if(v==null||lo==null||hi==null||hi<=lo) return null;
  let p=(v-lo)/(hi-lo);
  if(invert) p=1-p;
  return Math.max(0,Math.min(1,p));
}
function verdictOf(p){
  if(p==null) return null;
  if(p<0.2) return {cls:"v0",txt:"低檔"};
  if(p<0.4) return {cls:"v1",txt:"中低檔"};
  if(p<0.6) return {cls:"v2",txt:"中間值"};
  if(p<0.8) return {cls:"v3",txt:"中高檔"};
  return {cls:"v4",txt:"高檔"};
}

function JudgeRow({label,pos,extra}){
  const v=verdictOf(pos);
  return (
    <div className="judgerow">
      <div>{label}<div style={{fontSize:11,color:"var(--dim)"}}>{extra}</div></div>
      <div className="posbar">{pos!=null&&<div className="posmark" style={{left:`calc(${(pos*100).toFixed(1)}% - 1px)`}}/>}</div>
      <div style={{textAlign:"right"}}>{v?<span className={"verdict "+v.cls}>{v.txt}（{Math.round(pos*100)}%）</span>:<span style={{color:"var(--dim)"}}>—</span>}</div>
    </div>
  );
}

/* ============ 主程式 ============ */
/* ============ 個股消息（營運新聞 + 法說會外連） ============
   新聞：瀏覽器直連鉅亨 cnyes（避免資料中心出口被擋），Worker /news 為備援。
   規則：剝除 <mark> 等 HTML 標籤；標題／摘要／標籤含公司名才收；排除——
   ①盤中／盤後速報（鉅亨速報保留，如 Factset 預估）②「公司名：」開頭（鉅亨自動轉載的 MOPS 公告）
   ③加密貨幣類標籤 ④重複標題。依發佈時間新到舊取 10 則 */
const NEWS_TAG_BLOCK=["加密貨幣","虛擬貨幣","比特幣","鏈文"];
const stripTags=x=>String(x||"").replace(/<[^>]+>/g,"").trim();
/* 統一過濾（兩個來源共用）：含公司名才收；殺盤中/盤後速報；殺「公司名：」公告轉載（鉅亨速報保留）；
   殺加密幣標籤；標題去重；新到舊取 10。輸入為正規化項目 {_t,_s,tags,publishAt,u,s} */
function newsPick(items,name){
  const seen=new Set();
  return (items||[]).filter(it=>{
    if(!it._t) return false;
    if(!(it._t+it._s+it.tags.join(",")).includes(name)) return false;
    if(it.tags.some(t=>NEWS_TAG_BLOCK.some(b=>t.includes(b)))) return false;
    if(/^盤[中後]速報/.test(it._t)) return false;
    if(/^[^：:]{1,12}[：:]/.test(it._t)&&!/^鉅亨速報/.test(it._t)) return false;
    const k=it._t.replace(/\s/g,"");
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  }).sort((a,b)=>(b.publishAt||0)-(a.publishAt||0)).slice(0,10)
    .map(it=>({
      t:it._t, u:it.u, s:it.s,
      d:it.publishAt?new Date(it.publishAt*1000+8*3600e3).toISOString().slice(0,16).replace("T"," "):"",
    }));
}
async function loadStockNews(stock){
  const name=stock.name;
  const jobs=[
    /* 鉅亨（瀏覽器直連，有 CORS） */
    fetchJSON(`https://ess.api.cnyes.com/ess/api/v1/news/keyword?q=${encodeURIComponent(name)}&limit=30`)
      .then(j=>((j&&j.data&&j.data.items)||[]).map(it=>({
        _t:stripTags(it.title), _s:stripTags(it.summary),
        tags:(it.keywordForTag||[]).map(x=>String(x).trim()),
        publishAt:it.publishAt||0,
        u:"https://news.cnyes.com/news/id/"+it.newsId, s:"鉅亨網",
      }))),
    /* Yahoo 新聞搜尋（多媒體供稿：中央社/工商/經濟等；無 CORS，走 Worker 代理） */
    fetchJSON(`${PROXY}/ynews?q=${encodeURIComponent(name)}`)
      .then(j=>((j&&j.items)||[]).map(it=>({
        _t:stripTags(it.title), _s:stripTags(it.summary),
        tags:[], publishAt:it.publishAt||0, u:it.u, s:it.s||"Yahoo股市",
      }))),
  ];
  const settled=await Promise.allSettled(jobs);
  const merged=settled.flatMap(r=>r.status==="fulfilled"?r.value:[]);
  return newsPick(merged,name);
}

    const debtQuick=(lastQ&&lastQ.liab!=null&&lastQ.ca!=null&&lastQ.inv!=null&&(lastQ.ca-lastQ.inv)>0)?lastQ.liab/(lastQ.ca-lastQ.inv)*100:null;
    const hasBorrow=finRows.some(r=>r.stb!=null||r.ltb!=null);

    /* 年化檢視 Y（僅圖表用；數據分頁與資訊格維持逐季語意）：

      const revB=yr.map(r=>B(r.rev));

      const opB=yr.map(r=>B(r.op));

      const ltbB=yr.map(r=>B(r.ltb??((r.inv!=null||r.dep!=null)?0:null)));
      const borrowB=yr.map((r,i)=>(stbB[i]!=null||ltbB[i]!=null)?(stbB[i]||0)+(ltbB[i]||0):null);
      const fixedTurn=yr.map(r=>r.rev!=null&&r.ppe?r.rev/r.ppe*100:null);
      const invPct=yr.map(r=>r.inv!=null&&r.ca?r.inv/r.ca*100:null);
      const arPct=yr.map(r=>r.ar!=null&&r.ca?r.ar/r.ca*100:null);
      const apPct=yr.map(r=>r.ap!=null&&r.liab?r.ap/r.liab*100:null);
      const defensive=yr.map(r=>{
        if(r.rev==null||r.gp==null||r.op==null||r.cash_bs==null||r.ar==null) return null;
        const dailyOut=((r.rev-r.gp)+(r.gp-r.op)-(r.dep||0))/365;
        return dailyOut>0?(r.cash_bs+r.ar)/dailyOut:null;
      });
      const outsideRet=yr.map(r=>{
        const baseV=r.lti||r.eq;
        return r.nonop!=null&&baseV?r.nonop/baseV*100:null;
      });
      const stack=yr.map(r=>{
        if(r.assets==null) return null;
        const ppe=r.ppe||0,inv=r.inv||0,ar=r.ar||0,cash=r.cash_bs||0,lti=r.lti||0;
        return {ppe:ppe/1e5,inv:inv/1e5,ar:ar/1e5,cash:cash/1e5,lti:lti/1e5,other:Math.max(r.assets-ppe-inv-ar-cash-lti,0)/1e5};
      });
      return {labels,gm,om,nm,epsA,revPS,roe,roa,invD,arD,apD,ccc,oe,depCF,
        revB,ocfB,niB,opB,nonopB,stbB,ltbB,borrowB,fixedTurn,invPct,arPct,apPct,
        defensive,outsideRet,stack,
        hasDetail:yr.some(r=>r.inv!=null||r.dep!=null),
        hasBorrow:yr.some(r=>r.stb!=null||r.ltb!=null||r.inv!=null||r.dep!=null),
        hasNonop:yr.some(r=>r.nonop!=null),
        epsCagr,cagrY0};
    })();
    return {labels,gm,om,nm,epsQ,epsT,roe,roa,invD,arD,apD,ccc,oe,depCF,hasDetail,
      revB,ocfB,niB,opB,nonopB,stbB,ltbB,borrowB,fixedTurn,invPct,arPct,apPct,
      defensive,outsideRet,stack,debtQuick,hasBorrow,hasNonop,hasCA,
      depPS,depYears,debtYears,depB,capexB,epsCagr,cagrY0,Y};
  },[finRows,stock]);

  const FY=(finView&&finView.Y)||null;

  const divRows=useMemo(()=>{
    if(!fin||!fin.div||!fin.div.length) return null;
    const rows=fin.div.map(d=>{
      const ym=String(d.p).match(/(\d{2,3})\s*年/);
      const qm=String(d.p).match(/第\s*([1-4])\s*季/);
      const hm=String(d.p).match(/(上|下)半年/);
      return {...d,y:ym?+ym[1]:null,s:qm?+qm[1]:(hm?(hm[1]==="上"?2:4):0)};
    }).filter(d=>d.y!=null);
    rows.sort((a,b)=>a.y-b.y||a.s-b.s);
    return rows.length?rows:null;
  },[fin]);

  /* 年度股利彙總（現金/股票各年加總，供股利圖年化呈現） */
  const divY=useMemo(()=>{
    if(!divRows) return null;
    const m=new Map();
    divRows.forEach(d=>{
      const o=m.get(d.y)||{y:d.y,cash:0,stock:0};
      o.cash+=d.cash||0; o.stock+=d.stock||0;
      m.set(d.y,o);
    });
    if(!m.size) return null;
    const ys=[...m.keys()];
    const y0=Math.min(...ys),y1=Math.max(...ys);
    const rows=[];
    for(let y=y0;y<=y1;y++) rows.push(m.get(y)||{y,cash:0,stock:0});
    return rows;
  },[divRows]);

  /* 年度現金配息率（該年現金股利合計 ÷ 該年 EPS），供股利發放圖疊折線 */
  const payoutByRocY=useMemo(()=>{
    if(!divRows||!model) return null;
    const cashByY={};
    divRows.forEach(d=>{ if(d.cash) cashByY[d.y]=(cashByY[d.y]||0)+d.cash; });
    const m={};
    model.rows.forEach(r=>{ const ry=r.year-1911; if(cashByY[ry]!=null&&r.eps>0) m[ry]=cashByY[ry]/r.eps*100; });
    return m;
  },[divRows,model]);

  const jp=num(judgePrice);
  const judge=useMemo(()=>{
    if(!model||jp==null) return null;
    const allHi=model.rows.map(r=>r.hi).filter(v=>v!=null);
    const allLo=model.rows.map(r=>r.lo).filter(v=>v!=null);
    const allPeHi=model.rows.map(r=>r.peHi).filter(v=>v!=null);
    const allPeLo=model.rows.map(r=>r.peLo).filter(v=>v!=null);
    const allPbHi=model.rows.map(r=>r.pbHi).filter(v=>v!=null);
    const allPbLo=model.rows.map(r=>r.pbLo).filter(v=>v!=null);
    const allYHi=model.rows.map(r=>r.yAtLo).filter(v=>v!=null);
    const allYLo=model.rows.map(r=>r.yAtHi).filter(v=>v!=null);
    const pe=model.epsNow?jp/model.epsNow:null;
    const pb=model.bvpsNow?jp/model.bvpsNow:null;
    const y=model.dpsNow?model.dpsNow/jp*100:null;
    return {
      pe,pb,y,
      posPrice:allHi.length?positionOf(jp,Math.min(...allLo),Math.max(...allHi)):null,
      posPE:allPeHi.length?positionOf(pe,Math.min(...allPeLo),Math.max(...allPeHi)):null,
      posPB:allPbHi.length?positionOf(pb,Math.min(...allPbLo),Math.max(...allPbHi)):null,
      posY:allYHi.length?positionOf(y,Math.min(...allYLo),Math.max(...allYHi),true):null,
    };
  },[model,jp]);

  /* ===== 快速瀏覽模式：以今日收盤價算位階 ===== */
  const lastOf=a=>{ if(!a) return null; for(let i=a.length-1;i>=0;i--) if(a[i]!=null) return a[i]; return null; };
  const posLabel=p=>p==null?"":p<20?"低檔":p<40?"偏低":p<60?"中檔":p<80?"偏高":"高檔";
  const posColor=p=>p==null?"var(--dim)":p<40?"#53c8f5":p<60?"#e8eef5":"#ff9f43";
  const svPos=useMemo(()=>{
    if(!model||!stock||stock.quote.close==null) return null;
    const hi=model.rows.map(r=>r.hi).filter(v=>v!=null);
    const lo=model.rows.map(r=>r.lo).filter(v=>v!=null);
    return hi.length?positionOf(stock.quote.close,Math.min(...lo),Math.max(...hi)):null;
  },[model,stock]);

  const yearsAgo=d=>{ if(!d||d.length<4) return "—"; const y=+d.slice(0,4),m=+d.slice(4,6)||1; return fmt((Date.now()-new Date(y,m-1).getTime())/3.15576e10,1); };

  /* ===== 保留股（觀察清單）===== */
  const saveWatch=list=>{
    setWatch(list);
    try{ localStorage.setItem("twri-watch",JSON.stringify(list)); }
    catch(e){
      try{
        Object.keys(localStorage).filter(x=>x.startsWith("twri-y-")).forEach(x=>localStorage.removeItem(x));
        localStorage.setItem("twri-watch",JSON.stringify(list));
      }catch(e2){ alert("保留股儲存失敗：瀏覽器儲存空間不足，或處於無痕／隱私模式（關閉視窗後資料不會保留）。"); }
    }
  };
  /* 多群組：grps 陣列（舊資料 grp 字串自動相容讀取；寫入時遷移為 grps） */
  const grpsOf=w=>Array.isArray(w.grps)?(w.grps.length?w.grps:["未分類"]):[w.grp||"未分類"];
  const grpList=useMemo(()=>{ const s=new Set(); watch.forEach(w=>grpsOf(w).forEach(g=>s.add(g))); return [...s]; },[watch]);
  const watchFiltered=useMemo(()=>watchGrp==="全部"?watch:watch.filter(w=>grpsOf(w).includes(watchGrp)),[watch,watchGrp]);
  const toggleGrp=(code,g)=>{
    if(!g) return;
    if(g==="__new__"){
      const name=(prompt("新群組名稱：")||"").trim();
      if(!name) return;
      g=name;
    }
    saveWatch(watch.map(w=>{
      if(w.code!==code) return w;
      const cur=grpsOf(w);
      let next=cur.includes(g)?cur.filter(x=>x!==g):[...cur,g];
      if(!next.length) next=["未分類"];
      return {...w,grps:next,grp:undefined};
    }));
  };
  const isKept=stock&&watch.some(w=>w.code===stock.code);
  const keptGrps=stock?(watch.filter(w=>w.code===stock.code).flatMap(grpsOf)):[];
  const [keepMenu,setKeepMenu]=useState(false);
  const addKeep=g=>{
    if(!stock) return;
    if(g==="__new__"){
      const name=(prompt("新群組名稱：")||"").trim();
      if(!name){ setKeepMenu(false); return; }
      g=name;
    }
    if(isKept){ toggleGrp(stock.code,g); return; }   /* 已保留：切換群組成員資格，選單保持開啟可連點 */
    setKeepMenu(false);
    const entry={code:stock.code,name:stock.name,ts:new Date().toISOString().slice(0,10),grps:[g],snap:{
      price:stock.quote.close??null,
      eps:model?model.epsNow:null,
      ipoY:stock.ipo||null,
      debtY:finView&&finView.debtYears!=null?finView.debtYears:null,
      depPS:finView&&finView.depPS!=null?finView.depPS:null,
      depY:finView&&finView.depYears!=null?finView.depYears:null,
      payout:model&&model.payoutLast!=null?model.payoutLast:null,
      hiUp:model&&model.priceBand?model.priceBand.hiUp:null,
      watchP:model&&model.priceBand?model.priceBand.watch:null,
      loDn:model&&model.priceBand?model.priceBand.loDn:null,
    }};
    saveWatch([...watch,entry]);
  };
  const removeKeep=code=>saveWatch(watch.filter(w=>w.code!==code));
  /* 批次加入保留群組（篩選/盤後選股勾選欄）：已保留者附加群組、未保留者以清單資料建檔。
     表格情境無個股 model/finView，估價快照欄位留空顯示 —，日後開啟個股重新保留可更新 */
  const [selScr,setSelScr]=useState({});
  const [selPick,setSelPick]=useState({});
  const [selGrp,setSelGrp]=useState("未分類");
  useEffect(()=>{ if(!scrOpen) setSelScr({}); },[scrOpen]);
  useEffect(()=>{ if(!pickOpen) setSelPick({}); },[pickOpen]);
  const batchKeep=(codes,g)=>{
    if(g==="__new__"){
      const name=(prompt("新群組名稱：")||"").trim();
      if(!name) return false;
      g=name; setSelGrp(name);
    }
    const codeSet=new Set(codes);
    const next=watch.map(w=>{
      if(!codeSet.has(w.code)) return w;
      const gs=grpsOf(w);
      return gs.includes(g)?w:{...w,grps:[...gs,g]};
    });
    const haveSet=new Set(watch.map(w=>w.code));
    const ts=new Date().toISOString().slice(0,10);
    const adds=codes.filter(c=>!haveSet.has(c)).map(c=>{
      const co=(snap&&snap.companies.find(x=>x.code===c))||{};
      const q=(snap&&snap.quotes&&snap.quotes[c])||{};
      return {code:c,name:co.name||c,ts,grps:[g],snap:{
        price:q.close??null,eps:null,ipoY:co.ipo||null,debtY:null,depPS:null,depY:null,
        payout:null,hiUp:null,watchP:null,loDn:null}};
    });
    saveWatch([...next,...adds]);
    return true;
  };
  const customGrps=grpList.filter(g=>g!=="未分類");
  const onKeepClick=()=>{
    if(!stock) return;
    setKeepMenu(m=>!m);   /* ☆ 加入群組；★ 開同一選單切換群組/取消保留（不再一鍵移除） */
  };
  const openKept=code=>{ if(!snap) return; const c=snap.companies.find(x=>x.code===code); if(c){ setScrOpen(false); setPickOpen(false); pick(c); } };
  useEffect(()=>{ setKeepMenu(false); },[stock]);

  /* ===== 篩選（data/screen.json，pipeline 產生） ===== */
  useEffect(()=>{
    if((!scrOpen&&!pickOpen)||scrData) return;
    fetch("data/screen.json",{cache:"no-store"})
      .then(r=>{ if(!r.ok) throw new Error("尚未產生篩選資料（screen.json），請先跑 pipeline --build-screen"); return r.json(); })
      .then(setScrData)
      .catch(e=>setScrErr(String(e.message||e)));
  },[scrOpen,pickOpen,scrData]);
  const scrRows=useMemo(()=>{
    if(!scrData||!snap) return null;
    const names={}; snap.companies.forEach(c=>{names[c.code]=c.name;});
    /* 只收現行上市／上櫃普通股；XBRL 建庫夾帶的興櫃、公開發行、已下市代號一律排除 */
    let rows=scrData.rows.filter(r=>names[r.c]).map(r=>({...r,name:names[r.c]}));
    const dep=fDep!==""?+fDep:null, debt=fDebt!==""?+fDebt:null;
    if(dep!=null&&!isNaN(dep)) rows=rows.filter(r=>r.dep!=null&&r.dep<=dep&&r.dep>0);
    if(debt!=null&&!isNaN(debt)) rows=rows.filter(r=>r.debt!=null&&r.debt<=debt&&r.debt>=0);
    const {k,d}=scrSort;
    rows.sort((a,b)=>{
      const va=a[k],vb=b[k];
      if(va==null&&vb==null) return a.c<b.c?-1:1;
      if(va==null) return 1;
      if(vb==null) return -1;
      if(va<vb) return -d;
      if(va>vb) return d;
      return a.c<b.c?-1:1;
    });
    return rows;
  },[scrData,snap,fDep,fDebt,scrSort]);
  /* 盤後選股：五條件全過（營收/盈餘/EPS/NAV 成長 >0、ROE>0、償債年數<5）。
     成長率＝近4季 vs 前4季（需連續8季，虧轉盈與資料不足者 null 不列入）；ROE=近4季純益/最新股東權益；
     NAV成長＝每股淨值 vs 一年前（ROE 穩定下 NAV 成長 -> EPS 成長，ROE×NAV=EPS）。 */
  const pickRows=useMemo(()=>{
    if(!scrData||!snap) return null;
    const names={}; snap.companies.forEach(c=>{names[c.code]=c.name;});
    let rows=scrData.rows.filter(r=>
      names[r.c]&&
      r.revG!=null&&r.revG>0&&
      r.niG!=null&&r.niG>0&&
      r.roe!=null&&r.roe>0&&
      r.debt!=null&&r.debt>=0&&r.debt<5
    ).map(r=>{
      /* 估價衍生欄：
         EPS成長率＝連續四季EPS÷去年EPS−1（%，須為正）；
         本益成長比＝本益比÷EPS成長率；
         最低/次低PE價＝歷年年度平均本益比最低/次低 × 近4季EPS */
      const close=(snap.quotes[r.c]||{}).close??null;
      const eps4=r.eps4;
      const pe=(close!=null&&eps4!=null&&eps4>0)?close/eps4:null;
      const growR=(eps4!=null&&r.epsY!=null&&r.epsY>0)?(eps4/r.epsY-1)*100:null;
      const posG=growR!=null&&growR>0;
      return {...r,name:names[r.c],close,
        pe, growR,
        pgr:(pe!=null&&posG)?pe/growR:null,
        pLo:(r.peLo!=null&&eps4!=null&&eps4>0)?r.peLo*eps4:null,
        pLo2:(r.peLo2!=null&&eps4!=null&&eps4>0)?r.peLo2*eps4:null,
        p12:(eps4!=null&&eps4>0)?12*eps4:null};
    });
    const {k,d}=pickSort;
    rows.sort((a,b)=>{
      const va=a[k],vb=b[k];
      if(va==null&&vb==null) return a.c<b.c?-1:1;
      if(va==null) return 1;
      if(vb==null) return -1;
      if(va<vb) return -d;
      if(va>vb) return d;
      return a.c<b.c?-1:1;
    });
    return rows;
  },[scrData,snap,pickSort]);
  const pickTh=(k,label)=>(
    <th className="sortth" onClick={()=>setPickSort(s=>({k,d:s.k===k?-s.d:1}))}>
      {label}{pickSort.k===k?(pickSort.d===1?" ▲":" ▼"):""}
    </th>
  );
  const scrTh=(k,label)=>(
    <th className="sortth" onClick={()=>setScrSort(s=>({k,d:s.k===k?-s.d:1}))}>
      {label}{scrSort.k===k?(scrSort.d===1?" ▲":" ▼"):""}
    </th>
  );

  /* ===== 鍵盤 ← → 逐檔瀏覽 ===== */
  const browseList=useMemo(()=>{
    if(!snap) return null;
    if(browseWatch&&watchFiltered.length){
      const list=watchFiltered.map(w=>snap.companies.find(c=>c.code===w.code)).filter(Boolean);
      if(list.length) return list;
    }
    return [...snap.companies].sort((a,b)=>a.code.localeCompare(b.code));
  },[snap,browseWatch,watchFiltered]);
  useEffect(()=>{
    const h=e=>{
      if(e.key!=="ArrowLeft"&&e.key!=="ArrowRight") return;
      const t=e.target;
      if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable)) return;
      if(!browseList||!browseList.length) return;
      e.preventDefault();
      const cur=stock?browseList.findIndex(c=>c.code===stock.code):-1;
      const d=e.key==="ArrowRight"?1:-1;
      const ni=cur<0?0:(cur+d+browseList.length)%browseList.length;
      pick(browseList[ni]);
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[browseList,stock,pick]);

  /* ===== 背景預抓：目前這檔載完後，先抓下一檔×2與上一檔,按 ← → 幾乎即開 ===== */
  useEffect(()=>{
    if(!stock||!snap||!browseList||!browseList.length||loading) return;
    const idx=browseList.findIndex(c=>c.code===stock.code);
    if(idx<0) return;
    const n=browseList.length;
    const targets=[1,2,-1].map(d=>browseList[(idx+d+n)%n]).filter((c,i,a)=>c&&c.code!==stock.code&&a.findIndex(x=>x.code===c.code)===i);
    let cancelled=false;
    (async()=>{
      const nowY=new Date().getFullYear();
      const years=[]; for(let y=nowY-YEARS_BACK+1;y<=nowY;y++) years.push(y);
      for(const c of targets){
        if(cancelled) return;
        try{ await Promise.all([loadHistory(c.code,years,snap.quotes[c.code]||{},c.market),loadFin(c.code)]); }catch(e){}
      }
    })();
    return ()=>{cancelled=true;};
  },[stock,snap,browseList,loading]);

  const bandTable=model&&(
    <table className="pricetable mono">
      <thead><tr><th style={{width:130}}></th><th>高價上限</th><th>高價低限</th><th>關注價</th><th>低價上限</th><th>低價低限</th></tr></thead>
      <tbody>
        {[["3年歷史高低價",model.priceBand],["本益比價",model.peBand],["股價淨值比價",model.pbBand],["殖利率價",model.yBand]].map(([lab,b])=>(
          <tr key={lab}>
            <td>{lab}</td>
            <td className="hiv">{b?fmt(b.hiUp):"—"}</td>
            <td className="hiv">{b?fmt(b.hiDn):"—"}</td>
            <td className="avgv">{b?fmt(b.watch):"—"}</td>
            <td className="lov">{b?fmt(b.loUp):"—"}</td>
            <td className="lov">{b?fmt(b.loDn):"—"}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );

  return (
    <div>
      <div className="topbar">
        <h1>台股估價河流圖</h1>
        <button className="watchbtn" onClick={()=>setWatchOpen(o=>!o)}>★ 保留股（{watch.length}）</button>
        <button className={"watchbtn"+(scrOpen?" active":"")} onClick={()=>{setScrOpen(o=>!o);setPickOpen(false);}}>⚙ 篩選</button>
        <button className={"watchbtn"+(pickOpen?" active":"")} onClick={()=>{setPickOpen(o=>!o);setScrOpen(false);}}>◎ 盤後選股</button>
        <div className="modebtns">
          <button className={"watchbtn"+(mode==="screen"&&!scrOpen&&!pickOpen?" active":"")} onClick={()=>{setMode("screen");setScrOpen(false);setPickOpen(false);}}>⚡ 快速瀏覽</button>
          <button className={"watchbtn"+(mode==="detail"&&!scrOpen&&!pickOpen?" active":"")} onClick={()=>{setMode("detail");setScrOpen(false);setPickOpen(false);}}>▦ 完整模式</button>
        </div>
        <div className="searchwrap">
          <div className="searchbox">
            <div className="inputwrap">
              <input type="text" placeholder="輸入股號或股名（例：2330 或 台積電）" value={query}
                onChange={e=>onQuery(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")onSearch();}}/>
              {query&&<button className="clrbtn" onClick={()=>{setQuery("");setSugg([]);}} title="清除">✕</button>}
            </div>
            <button onClick={onSearch} disabled={!snap}>{snap?"查詢":"載入中…"}</button>
          </div>
          {sugg.length>0&&(
            <div className="sugg">
              {sugg.map(c=><div key={c.code} onMouseDown={()=>pick(c)}><span>{c.name}</span><span className="mono" style={{color:"var(--dim)"}}>{c.code}</span></div>)}
            </div>
          )}
        </div>
      </div>

      {snapErr&&<div className="errbox">無法載入 TWSE 全市場資料：{snapErr}<br/>請確認網路連線，或稍後重新整理頁面。</div>}
      {err&&<div className="errbox">{err}</div>}

      {watchOpen&&(
        <div className="card">
          <div className="cardtitle" style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <span>保留股（{watchFiltered.length}{watchGrp!=="全部"?`／${watch.length}`:""}）</span>
            <label style={{fontSize:12.5,color:"var(--dim)",fontWeight:400,display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}>
              <input type="checkbox" checked={browseWatch} onChange={e=>setBrowseWatch(e.target.checked)}/>
              ← → 僅在{watchGrp!=="全部"?`「${watchGrp}」群組`:"保留股"}間切換
            </label>
          </div>
          {grpList.length>0&&(

          <div>{prog.msg}</div>
          <div className="progressbar"><div style={{width:(prog.done/prog.total*100)+"%"}}/></div>
          <div style={{fontSize:12}}>首次查詢約 2–4 秒，之後同一檔會用快取秒開</div>
        </div>
      )}

      {model&&!loading&&mode==="detail"&&tab==="judge"&&(
          <div className="card">
            <div className="cardtitle">價格位階判斷（近 {YEARS_BACK} 年區間）</div>
            <div className="judge">
              <span style={{color:"var(--dim)",fontSize:14}}>輸入股價</span>
              <input type="number" step="0.5" value={judgePrice} onChange={e=>setJudgePrice(e.target.value)}/>
              {stock.quote.close!=null&&<button style={{padding:"8px 12px",fontSize:13,background:"var(--panel2)",border:"1px solid var(--border)"}} onClick={()=>setJudgePrice(String(stock.quote.close))}>回到收盤價</button>}
            </div>
            {judge&&(
              <React.Fragment>
                <JudgeRow label="股價位階" pos={judge.posPrice} extra={fmt(jp,1)+" 元"}/>
                <JudgeRow label="本益比位階" pos={judge.posPE} extra={judge.pe!=null?fmt(judge.pe,2)+" 倍":"—"}/>
                <JudgeRow label="淨值比位階" pos={judge.posPB} extra={judge.pb!=null?fmt(judge.pb,2)+" 倍":"—"}/>
                <JudgeRow label="殖利率位階" pos={judge.posY} extra={judge.y!=null?fmt(judge.y,2)+" %（低殖利率＝貴）":"—"}/>
              </React.Fragment>
            )}
            <div style={{marginTop:16}}>{bandTable}</div>
            <div className="note">
              高價上限／低限＝近 {BAND_YEARS} 年「年度最高值」的最大／最小值換算；關注價＝近 {BAND_YEARS} 年年度最高值的平均；低價上限／低限＝近 {BAND_YEARS} 年「年度最低值」的最大／最小值換算。
              換算基準：目前 EPS {fmt(model.epsNow,2)}、每股淨值 {fmt(model.bvpsNow,1)}、每股股息 {fmt(model.dpsNow,2)}{model.finUsed?"（EPS／淨值採用財報實際值）":"（由當日收盤價與本益比／淨值比／殖利率回推）"}。
            </div>
          </div>
      )}

      {model&&!loading&&mode==="detail"&&tab==="charts"&&(
        <React.Fragment>
          <div className="card" style={{padding:"12px 16px"}}>
            <div className="judge" style={{marginBottom:0}}>
              <span style={{color:"var(--dim)",fontSize:14}}>輸入股價</span>
              <input type="number" step="0.5" value={judgePrice} onChange={e=>setJudgePrice(e.target.value)}/>
              {stock.quote.close!=null&&<button style={{padding:"8px 12px",fontSize:13,background:"var(--panel2)",border:"1px solid var(--border)"}} onClick={()=>setJudgePrice(String(stock.quote.close))}>回到收盤價</button>}
              {judge&&judge.posPrice!=null&&(()=>{const v=verdictOf(judge.posPrice);return <span className={"verdict "+v.cls}>股價位階：{v.txt}（{Math.round(judge.posPrice*100)}%）</span>;})()}
            </div>
          </div>
          <div className="charts river">
            <RiverChart title="股價河流圖" years={hist.years}
              series={{hi:model.rows.map(r=>r.hi??null),lo:model.rows.map(r=>r.lo??null),avg:model.rows.map(r=>r.avg??null)}}
              nowValue={jp} nowLabel="輸入股價" decimals={jp!=null&&jp>=500?0:1}/>
            <RiverChart title="本益比河流圖" years={hist.years}
              series={{hi:model.rows.map(r=>r.peHi??null),lo:model.rows.map(r=>r.peLo??null),avg:model.rows.map(r=>r.peAvg??null)}}
              nowValue={judge&&judge.pe>0?judge.pe:null} nowLabel="目前本益比" decimals={1}/>
            <RiverChart title="股價淨值比河流圖" years={hist.years}
              series={{hi:model.rows.map(r=>r.pbHi??null),lo:model.rows.map(r=>r.pbLo??null),avg:model.rows.map(r=>r.pbAvg??null)}}
              nowValue={judge&&judge.pb>0?judge.pb:null} nowLabel="目前淨值比" decimals={2}/>
{false&&( /* 暫時隱藏（2026-07-12 Dale 指示，保留備用） */
            <RiverChart title="殖利率河流圖" years={hist.years}
              series={{hi:model.rows.map(r=>r.yAtHi??null),lo:model.rows.map(r=>r.yAtLo??null),avg:model.rows.map(r=>r.yAtAvg??null)}}
              nowValue={judge?judge.y:null} nowLabel="目前殖利率" decimals={1} invert={true}
              hiLabel="高檔殖利率（低%）" loLabel="低檔殖利率（高%）"
              note={(()=>{const ms=model.rows.filter(r=>r.hi!=null&&r.yAtHi==null).map(r=>r.year-1911);return ms.length?`${ms.join("、")} 年未配發股利（或交易所無殖利率資料），無法回推股息，該年段留白。`:null;})()}/>
            )}
            <RiverChart title="股價營收比河流圖" years={hist.years}
              series={{hi:model.rows.map(r=>r.psHi??null),lo:model.rows.map(r=>r.psLo??null),avg:model.rows.map(r=>r.psAvg??null)}}
              nowValue={jp!=null&&model.revPSNow>0?jp/model.revPSNow:null} nowLabel="目前營收比" decimals={2}/>
          </div>
          <div className="note" style={{marginTop:12}}>
            資料來源：臺灣證券交易所（openapi.twse.com.tw、www.twse.com.tw）、證券櫃檯買賣中心（www.tpex.org.tw）。歷年 EPS／淨值／股息係以各年 12 月（當年度取最近月份）之月均本益比、淨值比、殖利率與月均價回推，與財報實際數字可能有小幅差異。本工具僅供個人研究參考，非投資建議。
          </div>
        </React.Fragment>
      )}

      {!stock&&!snapErr&&(
        <div className="card" style={{textAlign:"center",padding:"48px 16px",color:"var(--dim)"}}>
          輸入股號或股名開始查詢<br/>
          <span style={{fontSize:12}}>目前支援上市（TWSE）股票 · 首次查詢會抓取近 {YEARS_BACK} 年歷史資料並快取於瀏覽器</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
